services:
  auto-assign:
    build: .
    container_name: auto-assign
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8090:8090"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default
      - assistx

networks:
  assistx:
    external: true
    name: auto-assist_default
